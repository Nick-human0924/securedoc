<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 涂黑 - SecureDoc</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .pdf-viewer {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            max-height: 600px;
            overflow: auto;
            padding: var(--space-sm);
        }
        .pdf-page {
            background: white;
            margin: 0 auto var(--space-sm);
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .pdf-page canvas {
            display: block;
        }
        .redaction-overlay {
            position: absolute;
            background: black;
            cursor: move;
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
        .redaction-overlay:hover {
            outline: 2px solid var(--accent-red);
        }
        .redaction-overlay .delete-btn {
            position: absolute;
            top: -20px;
            right: 0;
            background: var(--accent-red);
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            display: none;
            border-radius: 0.25rem;
        }
        .redaction-overlay:hover .delete-btn {
            display: block;
        }
        .toolbar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: var(--space-sm);
            border-radius: 0.75rem;
            margin-bottom: var(--space-md);
            display: flex;
            gap: var(--space-sm);
            align-items: center;
            flex-wrap: wrap;
        }
        .page-nav {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }
        .page-nav button {
            padding: 0.5rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }
        .page-nav button:hover:not(:disabled) {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        .page-nav button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .instruction {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: var(--space-md);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">◉</span>
            <span class="brand-name">SecureDoc</span>
        </div>
        <div class="nav-links">
            <a href="../index.html">首页</a>
            <a href="../index.html#tools" class="active">所有工具</a>
            <a href="../privacy.html">隐私说明</a>
        </div>
    </nav>

    <main>
        <div class="tool-page">
            <div class="tool-header">
                <h1>▓ PDF 涂黑</h1>
                <p>可视化涂黑敏感信息，永久删除原始内容</p>
            </div>

            <div class="trust-banner">
                ◉ 你的文件仅在本地浏览器中处理，涂黑操作永久删除原始内容
            </div>

            <div class="upload-area" id="dropZone">
                <div class="upload-icon">▓</div>
                <div class="upload-text">拖拽 PDF 文件到此处，或点击选择文件</div>
                <div class="upload-hint">支持单个文件，建议不超过 20MB</div>
                <input type="file" id="fileInput" accept=".pdf" hidden>
            </div>

            <div id="viewerArea" style="display: none;">
                <div class="instruction">
                    ◉ 在页面上拖拽绘制黑色区域，涂黑后将永久删除对应位置的原始内容
                </div>

                <div class="toolbar">
                    <div class="page-nav">
                        <button onclick="prevPage()" id="prevBtn">◀</button>
                        <span>第 <span id="currentPage">1</span> / <span id="totalPages">-</span> 页</span>
                        <button onclick="nextPage()" id="nextBtn">▶</button>
                    </div>
                    <button class="btn btn-secondary" onclick="clearRedactions()">清除当前页</button>
                    <button class="btn btn-secondary" onclick="clearAllRedactions()">清除全部</button>
                </div>

                <div class="pdf-viewer" id="pdfViewer"></div>
            </div>

            <div class="action-buttons" id="actionArea" style="display: none;">
                <button class="btn btn-secondary" onclick="clearFiles()">重新选择</button>
                <button class="btn btn-primary" onclick="applyRedactions()">应用涂黑并下载</button>
            </div>

            <div class="progress-container" id="progressArea">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">正在处理...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo">◉</span>
                <span>SecureDoc</span>
            </div>
            <p class="footer-note">本地隐私文档处理工具 · 文件从未离开你的电脑</p>
        </div>
    </footer>

    <script>
        // 设置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let currentFile = null;
        let pdfDoc = null;
        let pdfLibDoc = null;
        let currentPageNum = 1;
        let totalPages = 0;
        let scale = 1.5;
        let redactions = {}; // { pageNum: [{x, y, width, height}] }
        let isDrawing = false;
        let drawStart = null;
        let tempOverlay = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        // 点击上传
        dropZone.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        async function handleFiles(fileList) {
            const pdfFiles = Array.from(fileList).filter(f => f.type === 'application/pdf');
            if (pdfFiles.length === 0) {
                alert('请选择 PDF 文件');
                return;
            }

            currentFile = pdfFiles[0];

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;

                // 同时加载用于编辑
                pdfLibDoc = await PDFLib.PDFDocument.load(arrayBuffer.slice(0));

                document.getElementById('totalPages').textContent = totalPages;
                
                dropZone.style.display = 'none';
                document.getElementById('viewerArea').style.display = 'block';
                document.getElementById('actionArea').style.display = 'flex';

                renderPage(1);
            } catch (error) {
                console.error(error);
                alert('无法加载 PDF 文件：' + error.message);
            }
        }

        async function renderPage(pageNum) {
            const viewer = document.getElementById('pdfViewer');
            viewer.innerHTML = '';
            
            currentPageNum = pageNum;
            document.getElementById('currentPage').textContent = pageNum;
            document.getElementById('prevBtn').disabled = pageNum <= 1;
            document.getElementById('nextBtn').disabled = pageNum >= totalPages;

            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });

            const pageContainer = document.createElement('div');
            pageContainer.className = 'pdf-page';
            pageContainer.style.width = viewport.width + 'px';
            pageContainer.style.height = viewport.height + 'px';

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;

            pageContainer.appendChild(canvas);
            viewer.appendChild(pageContainer);

            // 恢复已有的涂黑区域
            if (redactions[pageNum]) {
                redactions[pageNum].forEach((rect, index) => {
                    createRedactionOverlay(pageContainer, rect, pageNum, index);
                });
            }

            // 添加绘制事件
            pageContainer.addEventListener('mousedown', startDrawing);
            pageContainer.addEventListener('mousemove', draw);
            pageContainer.addEventListener('mouseup', endDrawing);
            pageContainer.addEventListener('mouseleave', endDrawing);
        }

        function startDrawing(e) {
            if (e.button !== 0) return;
            
            const rect = e.currentTarget.getBoundingClientRect();
            drawStart = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            isDrawing = true;

            tempOverlay = document.createElement('div');
            tempOverlay.className = 'redaction-overlay';
            tempOverlay.style.left = drawStart.x + 'px';
            tempOverlay.style.top = drawStart.y + 'px';
            tempOverlay.style.width = '0px';
            tempOverlay.style.height = '0px';
            e.currentTarget.appendChild(tempOverlay);
        }

        function draw(e) {
            if (!isDrawing) return;

            const rect = e.currentTarget.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;

            const width = Math.abs(currentX - drawStart.x);
            const height = Math.abs(currentY - drawStart.y);
            const left = Math.min(currentX, drawStart.x);
            const top = Math.min(currentY, drawStart.y);

            tempOverlay.style.left = left + 'px';
            tempOverlay.style.top = top + 'px';
            tempOverlay.style.width = width + 'px';
            tempOverlay.style.height = height + 'px';
        }

        function endDrawing(e) {
            if (!isDrawing) return;
            isDrawing = false;

            const width = parseInt(tempOverlay.style.width);
            const height = parseInt(tempOverlay.style.height);

            if (width < 10 || height < 10) {
                tempOverlay.remove();
                tempOverlay = null;
                return;
            }

            if (!redactions[currentPageNum]) {
                redactions[currentPageNum] = [];
            }

            const rect = {
                x: parseInt(tempOverlay.style.left),
                y: parseInt(tempOverlay.style.top),
                width: width,
                height: height
            };

            const index = redactions[currentPageNum].length;
            redactions[currentPageNum].push(rect);

            const pageContainer = e.currentTarget;
            tempOverlay.remove();
            tempOverlay = null;
            createRedactionOverlay(pageContainer, rect, currentPageNum, index);
        }

        function createRedactionOverlay(container, rect, pageNum, index) {
            const overlay = document.createElement('div');
            overlay.className = 'redaction-overlay';
            overlay.style.left = rect.x + 'px';
            overlay.style.top = rect.y + 'px';
            overlay.style.width = rect.width + 'px';
            overlay.style.height = rect.height + 'px';

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '×';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                overlay.remove();
                redactions[pageNum].splice(index, 1);
                if (redactions[pageNum].length === 0) {
                    delete redactions[pageNum];
                }
            };
            overlay.appendChild(deleteBtn);

            container.appendChild(overlay);
        }

        function prevPage() {
            if (currentPageNum > 1) {
                renderPage(currentPageNum - 1);
            }
        }

        function nextPage() {
            if (currentPageNum < totalPages) {
                renderPage(currentPageNum + 1);
            }
        }

        function clearRedactions() {
            if (!redactions[currentPageNum]) return;
            
            if (confirm('确定清除当前页的所有涂黑区域吗？')) {
                delete redactions[currentPageNum];
                renderPage(currentPageNum);
            }
        }

        function clearAllRedactions() {
            if (Object.keys(redactions).length === 0) return;
            
            if (confirm('确定清除所有页面的涂黑区域吗？')) {
                redactions = {};
                renderPage(currentPageNum);
            }
        }

        function clearFiles() {
            if (!confirm('确定要重新选择文件吗？当前的所有涂黑区域将丢失。')) {
                return;
            }

            currentFile = null;
            pdfDoc = null;
            pdfLibDoc = null;
            redactions = {};
            currentPageNum = 1;
            totalPages = 0;

            dropZone.style.display = 'block';
            document.getElementById('viewerArea').style.display = 'none';
            document.getElementById('actionArea').style.display = 'none';
            document.getElementById('progressArea').classList.remove('active');
        }

        async function applyRedactions() {
            if (Object.keys(redactions).length === 0) {
                alert('请先添加涂黑区域');
                return;
            }

            const progressArea = document.getElementById('progressArea');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            progressArea.classList.add('active');
            document.getElementById('actionArea').style.display = 'none';

            try {
                const pages = pdfLibDoc.getPages();
                const pageKeys = Object.keys(redactions).map(Number);

                for (let i = 0; i < pageKeys.length; i++) {
                    const pageNum = pageKeys[i];
                    const page = pages[pageNum - 1];
                    const pageRedactions = redactions[pageNum];

                    progressText.textContent = `正在处理第 ${i + 1}/${pageKeys.length} 页...`;
                    progressFill.style.width = `${((i + 0.5) / pageKeys.length) * 100}%`;

                    const { width: pageWidth, height: pageHeight } = page.getSize();

                    for (const rect of pageRedactions) {
                        const pdfX = rect.x / scale;
                        const pdfY = pageHeight - (rect.y + rect.height) / scale;
                        const pdfWidth = rect.width / scale;
                        const pdfHeight = rect.height / scale;

                        page.drawRectangle({
                            x: pdfX,
                            y: pdfY,
                            width: pdfWidth,
                            height: pdfHeight,
                            color: PDFLib.rgb(0, 0, 0),
                            opacity: 1
                        });
                    }

                    progressFill.style.width = `${((i + 1) / pageKeys.length) * 100}%`;
                }

                progressText.textContent = '正在生成文件...';
                const modifiedBytes = await pdfLibDoc.save();

                const blob = new Blob([modifiedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');

                const link = document.createElement('a');
                link.href = url;
                link.download = `redacted_${timestamp}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                progressArea.classList.remove('active');
                
                if (confirm('涂黑已应用，文件已下载。是否清除当前工作？')) {
                    clearFiles();
                }

            } catch (error) {
                console.error(error);
                alert('涂黑失败：' + error.message);
                progressArea.classList.remove('active');
                document.getElementById('actionArea').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
