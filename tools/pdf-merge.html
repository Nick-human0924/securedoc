<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 合并 - SecureDoc</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">🔒</span>
            <span class="brand-name">SecureDoc</span>
        </div>
        <div class="nav-links">
            <a href="../index.html">首页</a>
            <a href="../index.html#tools" class="active">所有工具</a>
            <a href="../privacy.html">隐私说明</a>
        </div>
    </nav>

    <main>
        <div class="tool-page">
            <div class="tool-header">
                <h1>📑 PDF 合并</h1>
                <p>将多个 PDF 文件合并为一个，支持拖拽调整顺序</p>
            </div>

            <div class="trust-banner">
                🔐 你的文件仅在本地浏览器中处理，不会上传到服务器
            </div>

            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📁</div>
                <div class="upload-text">拖拽 PDF 文件到此处，或点击选择文件</div>
                <div class="upload-hint">支持多选，建议单个文件不超过 50MB</div>
                <input type="file" id="fileInput" accept=".pdf" multiple hidden>
            </div>

            <div class="file-list" id="fileList"></div>

            <div class="action-buttons" id="actionArea" style="display: none;">
                <button class="btn btn-secondary" onclick="clearFiles()">清空列表</button>
                <button class="btn btn-primary" onclick="mergePDFs()">开始合并</button>
            </div>

            <div class="progress-container" id="progressArea">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">正在处理...</div>
            </div>

            <div class="result-area" id="resultArea">
                <h3>✅ 合并完成！</h3>
                <p id="resultInfo"></p>
                <a class="btn btn-primary" id="downloadLink">下载合并后的 PDF</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>SecureDoc - 本地隐私文档处理工具</p>
        </div>
    </footer>

    <script>
        let files = [];

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const actionArea = document.getElementById('actionArea');

        // 点击上传
        dropZone.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(fileList) {
            const pdfFiles = Array.from(fileList).filter(f => f.type === 'application/pdf');
            if (pdfFiles.length === 0) {
                alert('请选择 PDF 文件');
                return;
            }
            files = files.concat(pdfFiles);
            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = '';
            
            files.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${formatFileSize(file.size)}</div>
                    </div>
                    <div class="file-move">
                        <button onclick="moveFile(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button>
                        <button onclick="moveFile(${index}, 1)" ${index === files.length - 1 ? 'disabled' : ''}>▼</button>
                    </div>
                    <button class="file-remove" onclick="removeFile(${index})">✕</button>
                `;
                fileList.appendChild(fileItem);
            });

            actionArea.style.display = files.length > 0 ? 'flex' : 'none';
        }

        function moveFile(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= files.length) return;
            
            [files[index], files[newIndex]] = [files[newIndex], files[index]];
            renderFileList();
        }

        function removeFile(index) {
            files.splice(index, 1);
            renderFileList();
        }

        function clearFiles() {
            files = [];
            renderFileList();
            document.getElementById('resultArea').classList.remove('active');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function mergePDFs() {
            if (files.length < 2) {
                alert('请至少选择 2 个 PDF 文件进行合并');
                return;
            }

            const progressArea = document.getElementById('progressArea');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            progressArea.classList.add('active');
            actionArea.style.display = 'none';

            try {
                // 创建新的 PDF 文档
                const mergedPdf = await PDFLib.PDFDocument.create();
                let totalPages = 0;

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    progressText.textContent = `正在处理第 ${i + 1}/${files.length} 个文件...`;
                    progressFill.style.width = `${((i + 0.5) / files.length) * 100}%`;

                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    
                    pages.forEach(page => mergedPdf.addPage(page));
                    totalPages += pages.length;

                    progressFill.style.width = `${((i + 1) / files.length) * 100}%`;
                }

                progressText.textContent = '正在生成文件...';
                const mergedPdfBytes = await mergedPdf.save();
                
                // 创建下载链接
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                
                const downloadLink = document.getElementById('downloadLink');
                downloadLink.href = url;
                downloadLink.download = `merged_${timestamp}.pdf`;

                // 显示结果
                document.getElementById('resultInfo').textContent = 
                    `成功合并 ${files.length} 个文件，共 ${totalPages} 页`;
                document.getElementById('resultArea').classList.add('active');

            } catch (error) {
                console.error(error);
                alert('合并失败：' + error.message);
            } finally {
                progressArea.classList.remove('active');
                actionArea.style.display = files.length > 0 ? 'flex' : 'none';
            }
        }
    </script>
</body>
</html>
