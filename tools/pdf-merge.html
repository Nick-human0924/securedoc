<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 合并 - SecureDoc</title>
    <meta name="description" content="将多个PDF文件合并为一个，支持拖拽调整顺序，本地处理不上传">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <span class="logo">◉</span>
            <span>SecureDoc</span>
        </div>
        <div class="nav-links">
            <a href="../index.html">工具</a>
            <a href="../privacy.html">隐私说明</a>
        </div>
    </nav>

    <main class="tool-page">
        <div class="tool-header">
            <h1><span style="color: var(--accent)">⧉</span> PDF 合并</h1>
            <p>将多个 PDF 文件合并为一个，支持拖拽调整顺序</p>
        </div>

        <div class="trust-banner">
            🔒 文件仅在浏览器本地处理，关闭页面后所有数据自动清空
        </div>

        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽 PDF 文件到此处，或点击选择文件</div>
            <div class="upload-hint">支持多选，按添加顺序合并</div>
            <input type="file" id="fileInput" accept=".pdf" multiple hidden>
        </div>

        <div class="file-list" id="fileList"></div>

        <div class="btn-group" id="actionArea" style="display: none;">
            <button class="btn btn-secondary" onclick="clearFiles()">清空列表</button>
            <button class="btn btn-primary" onclick="mergePDFs()">开始合并</button>
        </div>

        <div class="progress-container" id="progressArea">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">正在处理...</div>
        </div>

        <div class="result-area" id="resultArea">
            <h3>✓ 合并完成</h3>
            <p class="result-info" id="resultInfo"></p>
            <a class="btn btn-primary" id="downloadLink">下载合并后的 PDF</a>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 SecureDoc · 本地隐私文档处理工具</p>
    </footer>

    <script>
        let files = [];

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const actionArea = document.getElementById('actionArea');

        dropZone.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(fileList) {
            const pdfFiles = Array.from(fileList).filter(f => f.type === 'application/pdf');
            if (pdfFiles.length === 0) {
                alert('请选择 PDF 文件');
                return;
            }
            files = files.concat(pdfFiles);
            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = '';
            
            files.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${formatFileSize(file.size)}</div>
                    </div>
                    <div class="file-move">
                        <button onclick="moveFile(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button>
                        <button onclick="moveFile(${index}, 1)" ${index === files.length - 1 ? 'disabled' : ''}>▼</button>
                    </div>
                    <button class="file-remove" onclick="removeFile(${index})">✕</button>
                `;
                fileList.appendChild(fileItem);
            });

            actionArea.style.display = files.length > 0 ? 'flex' : 'none';
        }

        function moveFile(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= files.length) return;
            
            [files[index], files[newIndex]] = [files[newIndex], files[index]];
            renderFileList();
        }

        function removeFile(index) {
            files.splice(index, 1);
            renderFileList();
        }

        function clearFiles() {
            files = [];
            renderFileList();
            document.getElementById('resultArea').classList.remove('active');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        async function mergePDFs() {
            if (files.length < 2) {
                alert('请至少选择 2 个 PDF 文件进行合并');
                return;
            }

            showProgress('正在加载文件...', 10);

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                let totalPages = 0;

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    showProgress(`正在处理第 ${i + 1}/${files.length} 个文件...`, 
                        10 + (i / files.length) * 70);

                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    
                    pages.forEach(page => mergedPdf.addPage(page));
                    totalPages += pages.length;
                }

                showProgress('正在生成文件...', 90);
                const mergedPdfBytes = await mergedPdf.save();
                
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                
                const downloadLink = document.getElementById('downloadLink');
                downloadLink.href = url;
                downloadLink.download = `merged_${timestamp}.pdf`;

                document.getElementById('resultInfo').textContent = 
                    `成功合并 ${files.length} 个文件，共 ${totalPages} 页`;
                document.getElementById('resultArea').classList.add('active');
                actionArea.style.display = 'none';
                fileList.style.display = 'none';
                dropZone.style.display = 'none';
                hideProgress();
            } catch (error) {
                console.error(error);
                alert('合并失败: ' + error.message);
                hideProgress();
            }
        }

        function showProgress(text, percent) {
            const area = document.getElementById('progressArea');
            const fill = document.getElementById('progressFill');
            const label = document.getElementById('progressText');
            area.classList.add('active');
            fill.style.width = percent + '%';
            label.textContent = text;
        }

        function hideProgress() {
            document.getElementById('progressArea').classList.remove('active');
        }
    </script>
</body>
</html>
