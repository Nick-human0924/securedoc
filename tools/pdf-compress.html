<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 压缩 - SecureDoc</title>
    <meta name="description" content="压缩PDF文件大小，本地处理不上传">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <span class="logo">◉</span>
            <span>SecureDoc</span>
        </div>
        <div class="nav-links">
            <a href="../index.html">工具</a>
            <a href="../privacy.html">隐私说明</a>
        </div>
    </nav>

    <main class="tool-page">
        <div class="tool-header">
            <h1><span style="color: var(--accent)">⌇</span> PDF 压缩</h1>
            <p>减小 PDF 文件体积，保持可读性</p>
        </div>

        <div class="trust-banner">
            🔒 文件仅在浏览器本地处理，关闭页面后所有数据自动清空
        </div>

        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📄</div>
            <div class="upload-text">拖拽 PDF 文件到此处，或点击选择文件</div>
            <div class="upload-hint">仅支持单个 PDF 文件</div>
            <input type="file" id="fileInput" accept=".pdf" hidden>
        </div>

        <div id="optionsArea" style="display: none;">
            <div class="options-panel">
                <h4>压缩质量</h4>
                <div class="quality-slider">
                    <input type="range" id="qualitySlider" min="1" max="3" value="2" step="1">
                    <div class="quality-labels">
                        <span>高压缩（体积小）</span>
                        <span>平衡</span>
                        <span>低压缩（质量好）</span>
                    </div>
                </div>
            </div>

            <div class="file-item" style="margin-bottom: 1.5rem;">
                <div class="file-icon">📄</div>
                <div class="file-info">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-size" id="fileSize"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="resetFile()">重新选择</button>
                <button class="btn btn-primary" onclick="compressPDF()">开始压缩</button>
            </div>
        </div>

        <div class="progress-container" id="progressArea">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">正在处理...</div>
        </div>

        <div class="result-area" id="resultArea">
            <h3>✓ 压缩完成</h3>
            <p class="result-info" id="resultInfo"></p>
            <a class="btn btn-primary" id="downloadLink">下载压缩后的 PDF</a>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 SecureDoc · 本地隐私文档处理工具</p>
    </footer>

    <script>
        let currentFile = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const optionsArea = document.getElementById('optionsArea');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') handleFile(file);
        });

        function handleFile(file) {
            if (!file || file.type !== 'application/pdf') {
                alert('请选择 PDF 文件');
                return;
            }

            currentFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            
            dropZone.style.display = 'none';
            optionsArea.style.display = 'block';
        }

        async function compressPDF() {
            if (!currentFile) return;

            const qualityLevel = parseInt(document.getElementById('qualitySlider').value);
            showProgress('正在分析 PDF...', 10);

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                
                showProgress('正在压缩...', 30);

                // Get compression options based on quality level
                const options = {
                    useObjectStreams: true,
                    addDefaultDict: true,
                    preserveExistingEncryption: false
                };

                // For higher compression, we would ideally re-encode images
                // pdf-lib has limited compression options, so we rely on save options
                if (qualityLevel === 1) {
                    // High compression - most aggressive
                    Object.assign(options, {
                        objectsPerTick: 50
                    });
                } else if (qualityLevel === 2) {
                    // Balanced
                    Object.assign(options, {
                        objectsPerTick: 100
                    });
                } else {
                    // Low compression - preserve quality
                    Object.assign(options, {
                        objectsPerTick: 200
                    });
                }

                showProgress('正在生成文件...', 70);
                
                const pdfBytes = await pdfDoc.save(options);
                const originalSize = currentFile.size;
                const compressedSize = pdfBytes.length;
                const savings = ((originalSize - compressedSize) / originalSize * 100).toFixed(1);

                showProgress('准备下载...', 95);

                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                
                const downloadLink = document.getElementById('downloadLink');
                downloadLink.href = url;
                downloadLink.download = `compressed_${timestamp}.pdf`;

                const infoText = savings > 0 
                    ? `原始大小: ${formatFileSize(originalSize)} → 压缩后: ${formatFileSize(compressedSize)} (节省 ${savings}%)`
                    : `原始大小: ${formatFileSize(originalSize)} → 压缩后: ${formatFileSize(compressedSize)}`;
                
                document.getElementById('resultInfo').textContent = infoText;
                document.getElementById('resultArea').classList.add('active');
                optionsArea.style.display = 'none';
                hideProgress();
            } catch (error) {
                console.error(error);
                alert('压缩失败: ' + error.message);
                hideProgress();
            }
        }

        function resetFile() {
            currentFile = null;
            dropZone.style.display = 'block';
            optionsArea.style.display = 'none';
            document.getElementById('resultArea').classList.remove('active');
            fileInput.value = '';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function showProgress(text, percent) {
            const area = document.getElementById('progressArea');
            const fill = document.getElementById('progressFill');
            const label = document.getElementById('progressText');
            area.classList.add('active');
            fill.style.width = percent + '%';
            label.textContent = text;
        }

        function hideProgress() {
            document.getElementById('progressArea').classList.remove('active');
        }
    </script>
</body>
</html>
